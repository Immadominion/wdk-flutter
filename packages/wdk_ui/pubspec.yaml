name: wdk_ui
description: >-
  Themeable Flutter widget kit for WDK wallets — the Flutter analog of
  @tetherto/wdk-uikit-react-native. Provides a WdkTheme ThemeExtension plus
  composable, business-logic-free widgets (Balance, TransactionList,
  AssetSelector, NetworkSelector, AddressInput, AmountInput, QrCode, SeedPhrase).
version: 0.0.1
publish_to: none
repository: https://github.com/Immadominion/wdk-flutter

environment:
  sdk: ^3.11.0
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
