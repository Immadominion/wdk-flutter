name: wdk_starter_flutter
description: >-
  A production-ready Flutter Template Wallet that integrates Tether's WDK.
  Mirrors the official @tetherto/wdk-starter-react-native screen-for-screen.
publish_to: none
version: 1.0.0-alpha.1+1

environment:
  sdk: ^3.11.0
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  wdk_flutter:
    path: ../../packages/wdk_flutter
  wdk_ui:
    path: ../../packages/wdk_ui

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    # The WDK worklet bundle(s) you drop in during native bring-up (Part B).
    # See assets/bundles/README.md for the exact files + pinned versions.
    - assets/bundles/
